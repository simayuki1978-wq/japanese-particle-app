        --ink:        #1a1a2e;

        --blue:       #1a5276;
        --blue-mid:   #2e86c1;
        --blue-light: #ebf5fb;
        --gold:       #b7860b;
        --gold-light: #fef9e7;
        --green:      #1e8449;

```
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    background-image:
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,160,120,0.12) 39px, rgba(180,160,120,0.12) 40px),
        repeating-linear-gradient(180deg, transparent, transparent 39px, rgba(180,160,120,0.12) 39px, rgba(180,160,120,0.12) 40px);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 14px 40px;
    color: var(--ink);
}

/* ── DECORATIVE BG ── */
.bg-kanji {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-kanji span {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(200px, 38vw, 400px);
    font-weight: 700;
    color: rgba(192,57,43,0.04);
    user-select: none; line-height: 1;
}

/* ── HEADER ── */
.header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 480px;
    margin-bottom: 18px;
    position: relative; z-index: 1;
    animation: fadeUp .5s ease both;
}
.header-title {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    color: var(--red);
    letter-spacing: .08em;
}
.header-title .stamp {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--red); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(192,57,43,.35);
}
.top-btn {
    padding: 7px 15px;
    background: var(--ink); color: #fff;
    text-decoration: none; border-radius: 8px;
    font-size: 0.78rem; font-weight: 700;
    letter-spacing: .05em;
    transition: background .2s, transform .15s;
    white-space: nowrap;
}
.top-btn:hover { background: var(--blue); transform: translateY(-1px); }

/* ── PROGRESS BAR ── */
.progress-wrap {
    width: 100%; max-width: 480px;
    margin-bottom: 14px;
    position: relative; z-index: 1;
    animation: fadeUp .5s ease .08s both;
}
.progress-meta {
    display: flex; justify-content: space-between;
    font-size: 0.75rem; color: #9b8e7a;
    margin-bottom: 5px; letter-spacing: .04em;
}
.progress-bar-track {
    height: 7px; background: var(--border);
    border-radius: 99px; overflow: hidden;
}
.progress-bar-fill {
    height: 100%; background: var(--red);
    border-radius: 99px;
    transition: width .4s ease;
    width: 0%;
}

/* ── SCORE PILLS ── */
.score-row {
    display: flex; gap: 10px; justify-content: center;
    margin-bottom: 16px;
    position: relative; z-index: 1;
    animation: fadeUp .5s ease .12s both;
}
.pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 99px;
    font-size: 0.82rem; font-weight: 700;
    border: 1.5px solid;
}
.pill-correct { background: var(--green-light); color: var(--green); border-color: #a9dfbf; }
.pill-wrong   { background: var(--red-light);   color: var(--red);   border-color: #f5b7b1; }

/* ── CARD ── */
.card {
    background: var(--panel);
    border: 2px solid var(--ink);
    border-radius: var(--radius);
    box-shadow: 4px 4px 0 var(--ink);
    padding: 26px 22px 22px;
    width: 100%; max-width: 480px;
    position: relative; z-index: 1;
    animation: fadeUp .5s ease .18s both;
}

/* question sentence */
.question-label {
    font-size: 0.7rem; letter-spacing: .14em; text-transform: uppercase;
    color: #9b8e7a; margin-bottom: 12px;
}
.question {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(1.25rem, 5vw, 1.65rem);
    line-height: 1.9;
    text-align: center;
    margin-bottom: 24px;
    color: var(--ink);
    min-height: 3.5rem;
    display: flex; align-items: center; justify-content: center;
}
/* the blank */
.blank {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 2.2rem; height: 2rem;
    border-bottom: 3px solid var(--red);
    margin: 0 2px;
    font-size: 1.4rem;
    color: var(--red);
    font-weight: 700;
    transition: color .2s;
}

/* ── CHOICE BUTTONS ── */
.buttons {
    display: grid; grid-template-columns: repeat(5,1fr);
    gap: 8px; margin-bottom: 18px;
}
.choice {
    padding: 14px 4px;
    font-size: 1.2rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    border: 2px solid var(--border);
    border-radius: 11px;
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .12s, box-shadow .12s;
    box-shadow: 2px 2px 0 var(--border);
}
.choice:hover:not(:disabled) {
    background: var(--gold-light);
    border-color: var(--gold);
    box-shadow: 2px 2px 0 var(--gold);
    transform: translate(-1px,-1px);
}
.choice:active:not(:disabled) { transform: translate(1px,1px); box-shadow: none; }
.choice:disabled { cursor: default; }
.choice.correct {
    background: var(--green-light); border-color: var(--green);
    color: var(--green); box-shadow: 2px 2px 0 var(--green);
}
.choice.wrong {
    background: var(--red-light); border-color: var(--red);
    color: var(--red); box-shadow: 2px 2px 0 var(--red);
}

/* ── RESULT ── */
.result-row {
    display: flex; align-items: center; justify-content: center;
    min-height: 32px; margin-bottom: 14px;
    font-size: 1rem; font-weight: 700; letter-spacing: .04em;
    gap: 8px;
}
.result-correct { color: var(--green); }
.result-wrong   { color: var(--red); }

/* ── EXPLANATION ── */
.explain-toggle {
    display: inline-flex; align-items: center; gap: 5px;
    cursor: pointer; font-size: 0.8rem; color: var(--blue-mid);
    font-weight: 700; letter-spacing: .04em;
    margin-bottom: 10px;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1.5px solid var(--blue-light);
    background: var(--blue-light);
    transition: background .15s;
    user-select: none;
}
.explain-toggle:hover { background: #d6eaf8; }

.explanation {
    background: var(--gold-light);
    border: 1.5px solid #f0d98a;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.85rem;
    line-height: 2;
    display: none;
    margin-bottom: 14px;
    color: var(--ink);
}
.explanation.visible { display: block; }
.explanation .flag-row { display: flex; align-items: center; gap: 8px; }
.explanation .particle-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    background: var(--gold); color: #fff;
    border-radius: 50%; font-size: 1.1rem; font-weight: 700;
    flex-shrink: 0; margin-right: 4px;
}

/* ── NEXT BUTTON ── */
.next-btn {
    width: 100%; padding: 14px;
    background: var(--ink); color: #fff;
    border: 2px solid var(--ink);
    border-radius: 11px;
    font-size: 1rem; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--border);
    transition: background .18s, transform .14s, box-shadow .14s;
    letter-spacing: .06em;
}
.next-btn:hover { background: var(--blue); border-color: var(--blue); transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--blue-mid); }
.next-btn:active { transform: translate(1px,1px); box-shadow: none; }

/* ── FINISH OVERLAY ── */
.finish-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(253,248,240,.92);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 18px;
    animation: fadeIn .4s ease;
}
.finish-overlay.visible { display: flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.finish-card {
    background: var(--panel);
    border: 2px solid var(--ink);
    box-shadow: 5px 5px 0 var(--ink);
    border-radius: var(--radius);
    padding: 36px 32px;
    text-align: center; max-width: 340px; width: 90%;
}
.finish-emoji { font-size: 3rem; margin-bottom: 10px; }
.finish-title {
    font-family: 'Kaisei Decol', serif;
    font-size: 1.5rem; color: var(--blue);
    margin-bottom: 8px;
}
.finish-score {
    font-size: 2.5rem; font-weight: 700;
    color: var(--ink); margin: 12px 0;
    letter-spacing: .04em;
}
.finish-sub { font-size: 0.82rem; color: #9b8e7a; margin-bottom: 20px; }
.finish-btn {
    padding: 12px 28px;
    background: var(--ink); color: #fff;
    border: 2px solid var(--ink); border-radius: 10px;
    font-size: 0.95rem; font-weight: 700;
    font-family: inherit; cursor: pointer;
    box-shadow: 3px 3px 0 var(--border);
    transition: background .18s, transform .14s;
}
.finish-btn:hover { background: var(--blue); border-color: var(--blue); transform: translate(-1px,-1px); }

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
}

<script>
const questions = [
{ sentence:"猫___寝ている",answer:"が"}, { sentence:"犬___走っている",answer:"が"}, { sentence:"雨___降っている",answer:"が"}, { sentence:"風___吹いている",answer:"が"}, { sentence:"子供___遊んでいる",answer:"が"}, { sentence:"先生___来た",answer:"が"}, { sentence:"友達___笑っている",answer:"が"}, { sentence:"鳥___飛んでいる",answer:"が"}, { sentence:"電車___来る",answer:"が"}, { sentence:"音___聞こえる",answer:"が"}, { sentence:"誰___来た？",answer:"が"}, { sentence:"何___落ちた？",answer:"が"}, { sentence:"雪___降っている",answer:"が"}, { sentence:"水___流れている",answer:"が"}, { sentence:"人___集まっている",answer:"が"}, { sentence:"赤ちゃん___泣いている",answer:"が"}, { sentence:"電話___鳴っている",answer:"が"}, { sentence:"ドア___開いた",answer:"が"}, { sentence:"星___光っている",answer:"が"}, { sentence:"雲___動いている",answer:"が"},
{ sentence:"水___飲む",answer:"を"}, { sentence:"ご飯___食べる",answer:"を"}, { sentence:"本___読む",answer:"を"}, { sentence:"映画___見る",answer:"を"}, { sentence:"音楽___聞く",answer:"を"}, { sentence:"手紙___書く",answer:"を"}, { sentence:"写真___撮る",answer:"を"}, { sentence:"テレビ___見る",answer:"を"}, { sentence:"靴___履く",answer:"を"}, { sentence:"ドア___閉める",answer:"を"}, { sentence:"窓___開ける",answer:"を"}, { sentence:"名前___書く",answer:"を"}, { sentence:"パン___買う",answer:"を"}, { sentence:"コーヒー___飲む",answer:"を"}, { sentence:"荷物___持つ",answer:"を"}, { sentence:"かばん___持つ",answer:"を"}, { sentence:"鍵___探す",answer:"を"}, { sentence:"車___洗う",answer:"を"}, { sentence:"顔___洗う",answer:"を"}, { sentence:"道___歩く",answer:"を"},
{ sentence:"学校___行く",answer:"に"}, { sentence:"家___帰る",answer:"に"}, { sentence:"駅___行く",answer:"に"}, { sentence:"東京___行く",answer:"に"}, { sentence:"友達___会う",answer:"に"}, { sentence:"先生___聞く",answer:"に"}, { sentence:"店___行く",answer:"に"}, { sentence:"部屋___入る",answer:"に"}, { sentence:"外___出る",answer:"に"}, { sentence:"椅子___座る",answer:"に"}, { sentence:"机___置く",answer:"に"}, { sentence:"ここ___来る",answer:"に"}, { sentence:"あそこ___行く",answer:"に"}, { sentence:"友達___電話する",answer:"に"}, { sentence:"人___話す",answer:"に"}, { sentence:"子供___教える",answer:"に"}, { sentence:"会社___行く",answer:"に"}, { sentence:"病院___行く",answer:"に"}, { sentence:"玄関___入る",answer:"に"}, { sentence:"窓___近づく",answer:"に"},
{ sentence:"公園___遊ぶ",answer:"で"}, { sentence:"学校___勉強する",answer:"で"}, { sentence:"家___食べる",answer:"で"}, { sentence:"図書館___読む",answer:"で"}, { sentence:"店___買う",answer:"で"}, { sentence:"電車___行く",answer:"で"}, { sentence:"バス___行く",answer:"で"}, { sentence:"手___書く",answer:"で"}, { sentence:"日本語___話す",answer:"で"}, { sentence:"ここ___待つ",answer:"で"}, { sentence:"外___遊ぶ",answer:"で"}, { sentence:"会社___働く",answer:"で"}, { sentence:"教室___座る",answer:"で"}, { sentence:"駅___待つ",answer:"で"}, { sentence:"ホテル___泊まる",answer:"で"}, { sentence:"キッチン___料理する",answer:"で"}, { sentence:"パソコン___書く",answer:"で"}, { sentence:"電話___話す",answer:"で"}, { sentence:"庭___遊ぶ",answer:"で"}, { sentence:"海___泳ぐ",answer:"で"},
{ sentence:"猫___魚が好き",answer:"は"}, { sentence:"この本___面白い",answer:"は"}, { sentence:"日本___食べ物が美味しい",answer:"は"}, { sentence:"夏___暑い",answer:"は"}, { sentence:"冬___寒い",answer:"は"}, { sentence:"ここ___静かだ",answer:"は"}, { sentence:"山___高い",answer:"は"}, { sentence:"空___青い",answer:"は"}, { sentence:"この店___安い",answer:"は"}, { sentence:"この町___人が多い",answer:"は"}, { sentence:"この部屋___広い",answer:"は"}, { sentence:"海___水が冷たい",answer:"は"}, { sentence:"この映画___人気がある",answer:"は"}, { sentence:"この料理___味がいい",answer:"は"}, { sentence:"この道___車が多い",answer:"は"}, { sentence:"夜___星が見える",answer:"は"}, { sentence:"この問題___難しい",answer:"は"}, { sentence:"春___花が咲く",answer:"は"}, { sentence:"秋___葉が落ちる",answer:"は"}, { sentence:"今日は天気___いい",answer:"が"}
];

const explanations = {
    "が": { label:"が",  ja:"主体・主語", en:"Subject / the doer",    vi:"Chủ thể hành động" },
    "を": { label:"を",  ja:"動作の対象", en:"Object of the action",   vi:"Đối tượng của hành động" },
    "に": { label:"に",  ja:"行き先・対象", en:"Destination / target", vi:"Nơi đến / đối tượng" },
    "で": { label:"で",  ja:"場所・手段",  en:"Place / means",         vi:"Địa điểm / phương tiện" },
    "は": { label:"は",  ja:"話題・トピック", en:"Topic marker",        vi:"Chủ đề câu nói" }
};

let deck = [], index = 0, correct = 0, wrong = 0, answered = false;

function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }

function init() {
    deck = shuffle(questions);
    index = 0; correct = 0; wrong = 0;
    document.getElementById('finish-overlay').classList.remove('visible');
    load();
}

function load() {
    const q = deck[index];
    // render sentence with styled blank
    const parts = q.sentence.split('___');
    const qEl = document.getElementById('question');
    qEl.innerHTML = '';
    parts.forEach((part, i) => {
        qEl.appendChild(document.createTextNode(part));
        if (i < parts.length - 1) {
            const span = document.createElement('span');
            span.className = 'blank';
            span.id = 'blank-span';
            span.textContent = '＿';
            qEl.appendChild(span);
        }
    });

    document.getElementById('result').textContent = '';
    document.getElementById('result').className = 'result-row';
    const expEl = document.getElementById('explanation');
    expEl.classList.remove('visible');
    expEl.innerHTML = '';
    document.getElementById('explain-wrap').style.display = 'none';
    document.getElementById('explain-toggle').textContent = '💡 解説を見る';

    answered = false;
    document.querySelectorAll('.choice').forEach(b => {
        b.classList.remove('correct', 'wrong');
        b.disabled = false;
    });

    // progress
    const pct = Math.round((index / deck.length) * 100);
    document.getElementById('progress-label').textContent = `${index + 1} / ${deck.length}`;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('score-correct').textContent = correct;
    document.getElementById('score-wrong').textContent = wrong;
}

document.getElementById('buttons').addEventListener('click', e => {
    const btn = e.target.closest('.choice');
    if (!btn || answered) return;
    const p = btn.dataset.p;
    selectAnswer(p, btn);
});

function selectAnswer(p, btn) {
    answered = true;
    const q = deck[index];
    const resultEl = document.getElementById('result');
    const blankSpan = document.getElementById('blank-span');

    if (p === q.answer) {
        btn.classList.add('correct');
        resultEl.innerHTML = '✔ 正解！';
        resultEl.className = 'result-row result-correct';
        if (blankSpan) { blankSpan.textContent = q.answer; blankSpan.style.color = 'var(--green)'; blankSpan.style.borderBottomColor = 'var(--green)'; }
        correct++;
    } else {
        btn.classList.add('wrong');
        resultEl.innerHTML = `✘ 正解は「<strong>${q.answer}</strong>」`;
        resultEl.className = 'result-row result-wrong';
        if (blankSpan) { blankSpan.textContent = q.answer; blankSpan.style.color = 'var(--red)'; }
        document.querySelectorAll('.choice').forEach(b => {
            if (b.dataset.p === q.answer) b.classList.add('correct');
        });
        wrong++;
    }

    document.querySelectorAll('.choice').forEach(b => b.disabled = true);

    // build explanation
    const e = explanations[q.answer];
    document.getElementById('explanation').innerHTML = `
        <div class="flag-row">
            <span class="particle-badge">${e.label}</span>
            <div>
                🇯🇵 ${e.ja}<br>
                🇺🇸 ${e.en}<br>
                🇻🇳 ${e.vi}
            </div>
        </div>`;
    document.getElementById('explain-wrap').style.display = 'block';
    document.getElementById('score-correct').textContent = correct;
    document.getElementById('score-wrong').textContent = wrong;
}

function next() {
    index++;
    if (index >= deck.length) {
        showFinish(); return;
    }
    load();
}

function toggleExplanation() {
    const el = document.getElementById('explanation');
    const toggle = document.getElementById('explain-toggle');
    el.classList.toggle('visible');
    toggle.textContent = el.classList.contains('visible') ? '💡 解説を閉じる' : '💡 解説を見る';
}

function showFinish() {
    const total = deck.length;
    const pct = Math.round((correct / total) * 100);
    let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '😊' : '📚';
    document.getElementById('finish-emoji').textContent = emoji;
    document.getElementById('finish-score').textContent = `${correct} / ${total}`;
    document.getElementById('finish-sub').textContent = `正解率 ${pct}%　不正解 ${wrong} 問`;
    document.getElementById('finish-overlay').classList.add('visible');
}

function restart() { init(); }

init();
</script>
