*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    background-image:
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,160,120,0.12) 39px, rgba(180,160,120,0.12) 40px),
        repeating-linear-gradient(180deg, transparent, transparent 39px, rgba(180,160,120,0.12) 39px, rgba(180,160,120,0.12) 40px);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 16px 14px 48px;
    color: var(--ink);
}

/* ── BG ── */
.bg-kanji {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-kanji span {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(200px, 38vw, 420px);
    font-weight: 700;
    color: rgba(108,52,131,0.05);
    user-select: none; line-height: 1;
}

/* ── HEADER ── */
.header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 520px;
    margin-bottom: 18px;
    position: relative; z-index: 1;
    animation: fadeUp .5s ease both;
}
.header-title {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    color: var(--purple);
    letter-spacing: .08em;
}
.header-title .stamp {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--purple); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 700; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(108,52,131,.35);
}
.top-btn {
    padding: 7px 15px;
    background: var(--ink); color: #fff;
    text-decoration: none; border-radius: 8px;
    font-size: 0.78rem; font-weight: 700;
    letter-spacing: .05em;
    transition: background .2s, transform .15s;
    white-space: nowrap;
}
.top-btn:hover { background: var(--blue); transform: translateY(-1px); }

/* ── PROGRESS ── */
.progress-wrap {
    width: 100%; max-width: 520px;
    margin-bottom: 14px;
    position: relative; z-index: 1;
    animation: fadeUp .5s ease .08s both;
}
.progress-meta {
    display: flex; justify-content: space-between;
    font-size: 0.75rem; color: #9b8e7a;
    margin-bottom: 5px; letter-spacing: .04em;
}
.progress-bar-track {
    height: 7px; background: var(--border);
    border-radius: 99px; overflow: hidden;
}
.progress-bar-fill {
    height: 100%; background: var(--purple);
    border-radius: 99px; transition: width .4s ease; width: 0%;
}

/* ── SCORE PILLS ── */
.score-row {
    display: flex; gap: 10px; justify-content: center;
    margin-bottom: 16px;
    position: relative; z-index: 1;
    animation: fadeUp .5s ease .12s both;
}
.pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 99px;
    font-size: 0.82rem; font-weight: 700; border: 1.5px solid;
}
.pill-correct { background: var(--green-light); color: var(--green); border-color: #a9dfbf; }
.pill-wrong   { background: var(--red-light);   color: var(--red);   border-color: #f5b7b1; }

/* ── CARD ── */
.card {
    background: var(--panel);
    border: 2px solid var(--ink);
    border-radius: var(--radius);
    box-shadow: 4px 4px 0 var(--ink);
    padding: 24px 22px 20px;
    width: 100%; max-width: 520px;
    position: relative; z-index: 1;
    animation: fadeUp .5s ease .18s both;
    margin-bottom: 14px;
}

/* 例文表示 */
.sentence-label {
    font-size: 0.68rem; letter-spacing: .14em; text-transform: uppercase;
    color: #9b8e7a; margin-bottom: 8px;
}
.sentence-box {
    background: var(--purple-light);
    border-left: 4px solid var(--purple);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 1.05rem;
    line-height: 1.8;
    margin-bottom: 14px;
    color: var(--ink);
}
/* ハイライト対象語 */
.sentence-box .highlight {
    background: var(--purple);
    color: #fff;
    border-radius: 4px;
    padding: 1px 5px;
    font-weight: 700;
}

/* 問い */
.question-label {
    font-size: 0.68rem; letter-spacing: .14em; text-transform: uppercase;
    color: #9b8e7a; margin-bottom: 6px;
}
.question {
    font-family: 'Kaisei Decol', serif;
    font-size: clamp(1.1rem, 4vw, 1.4rem);
    color: var(--ink);
    margin-bottom: 14px;
    line-height: 1.6;
}
.question .topic-word {
    color: var(--purple);
    font-weight: 700;
    border-bottom: 2px solid var(--purple);
    padding-bottom: 1px;
}

/* ── CHOICE BUTTONS ── */
.buttons {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px; margin-bottom: 12px;
}
.choice {
    padding: 16px 10px;
    font-size: 1.05rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    border: 2px solid var(--border);
    border-radius: 11px;
    background: var(--paper);
    color: var(--ink);
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .12s, box-shadow .12s;
    box-shadow: 2px 2px 0 var(--border);
    text-align: center;
}
.choice:hover:not(:disabled) {
    background: var(--purple-light);
    border-color: var(--purple);
    box-shadow: 2px 2px 0 var(--purple);
    transform: translate(-1px,-1px);
}
.choice:active:not(:disabled) { transform: translate(1px,1px); box-shadow: none; }
.choice:disabled { cursor: default; }
.choice.correct {
    background: var(--green-light); border-color: var(--green);
    color: var(--green); box-shadow: 2px 2px 0 var(--green);
}
.choice.wrong {
    background: var(--red-light); border-color: var(--red);
    color: var(--red); box-shadow: 2px 2px 0 var(--red);
}

/* ── RESULT ── */
.result-row {
    display: flex; align-items: center; justify-content: center;
    min-height: 30px; margin-bottom: 14px;
    font-size: 1rem; font-weight: 700; letter-spacing: .04em; gap: 8px;
}
.result-correct { color: var(--green); }
.result-wrong   { color: var(--red); }

/* ── EXPLANATION ── */
.explain-toggle {
    display: inline-flex; align-items: center; gap: 5px;
    cursor: pointer; font-size: 0.8rem; color: var(--purple);
    font-weight: 700; letter-spacing: .04em;
    margin-bottom: 10px;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1.5px solid var(--purple-light);
    background: var(--purple-light);
    transition: background .15s;
    user-select: none;
}
.explain-toggle:hover { background: #ead5f5; }

.explanation {
    background: var(--gold-light);
    border: 1.5px solid #f0d98a;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.85rem;
    line-height: 2;
    display: none;
    margin-bottom: 14px;
    color: var(--ink);
}
.explanation.visible { display: block; }

.exp-rule {
    display: flex; align-items: flex-start; gap: 10px;
}
.exp-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 52px; height: 32px;
    background: var(--purple); color: #fff;
    border-radius: 8px; font-size: 0.95rem; font-weight: 700;
    flex-shrink: 0; letter-spacing: .04em;
    padding: 0 8px;
}
.exp-lines { line-height: 1.9; }

/* ── CORRECT SENTENCE BOX ── */
.correct-sentence-wrap { display: none; margin-bottom: 12px; }
.correct-sentence-wrap.visible { display: block; }
.correct-sentence-label {
    font-size: 0.68rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--green); font-weight: 700; margin-bottom: 6px;
}
.correct-sentence-text {
    background: var(--green-light);
    border: 1.5px solid #a9dfbf;
    border-left: 4px solid var(--green);
    border-radius: 8px;
    padding: 11px 15px;
    font-size: 1.05rem; line-height: 1.8; color: var(--ink);
}
.correct-sentence-text .topic-hl {
    color: var(--green); font-weight: 700;
    border-bottom: 2px solid var(--green); padding-bottom: 1px;
}

/* ── NEXT BUTTON ── */
.next-btn {
    width: 100%; padding: 14px;
    background: var(--ink); color: #fff;
    border: 2px solid var(--ink);
    border-radius: 11px;
    font-size: 1rem; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--border);
    transition: background .18s, transform .14s, box-shadow .14s;
    letter-spacing: .06em;
}
.next-btn:hover { background: var(--purple); border-color: var(--purple); transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #9b59b6; }
.next-btn:active { transform: translate(1px,1px); box-shadow: none; }

/* ── FINISH OVERLAY ── */
.finish-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(253,248,240,.92); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; flex-direction: column;
    animation: fadeIn .4s ease;
}
.finish-overlay.visible { display: flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.finish-card {
    background: var(--panel);
    border: 2px solid var(--ink);
    box-shadow: 5px 5px 0 var(--ink);
    border-radius: var(--radius);
    padding: 36px 32px;
    text-align: center; max-width: 340px; width: 90%;
}
.finish-emoji { font-size: 3rem; margin-bottom: 10px; }
.finish-title { font-family: 'Kaisei Decol', serif; font-size: 1.5rem; color: var(--purple); margin-bottom: 8px; }
.finish-score { font-size: 2.5rem; font-weight: 700; color: var(--ink); margin: 12px 0; }
.finish-sub   { font-size: 0.82rem; color: #9b8e7a; margin-bottom: 20px; }
.finish-btn {
    padding: 12px 28px;
    background: var(--ink); color: #fff;
    border: 2px solid var(--ink); border-radius: 10px;
    font-size: 0.95rem; font-weight: 700;
    font-family: inherit; cursor: pointer;
    box-shadow: 3px 3px 0 var(--border);
    transition: background .18s, transform .14s;
}
.finish-btn:hover { background: var(--purple); border-color: var(--purple); transform: translate(-1px,-1px); }

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideIn {
    from { opacity: 0; transform: translateX(28px); }
    to   { opacity: 1; transform: translateX(0); }
}
.slide { animation: slideIn .22s ease both; }

    sentence: "彼女が教室で質問を先生にしました。",
    elements: [
      { word:"彼女が",   topic:"彼女は",   particle:"が", role:"subject"  },
      { word:"教室で",   topic:"教室では",  particle:"で", role:"place"    },
      { word:"質問を",   topic:"質問は",   particle:"を", role:"object"   },
      { word:"先生に",   topic:"先生には",  particle:"に", role:"target"   },
    ]
  },
  {
    sentence: "私が公園で写真を友だちに送りました。",
    elements: [
      { word:"私が",     topic:"私は",     particle:"が", role:"subject"  },
      { word:"公園で",   topic:"公園では",  particle:"で", role:"place"    },
      { word:"写真を",   topic:"写真は",   particle:"を", role:"object"   },
      { word:"友だちに", topic:"友だちには",particle:"に", role:"target"   },
    ]
  }
];

// ── 解説テキスト ──
const explanations = {
  "が": {
    rule: "が → は",
    ja: "主語をトピックにするとき、「が」を「は」に変えます。",
    en: "When making the subject the topic, replace 「が」 with 「は」.",
    vi: "Khi biến chủ ngữ thành chủ đề, thay「が」bằng「は」."
  },
  "で": {
    rule: "で → では",
    ja: "場所をトピックにするとき、「で」に「は」を加えて「では」にします。",
    en: "When making a place the topic, add 「は」 to 「で」 to get 「では」.",
    vi: "Khi biến nơi chốn thành chủ đề, thêm「は」vào「で」để được「では」."
  },
  "を": {
    rule: "を → は",
    ja: "対象をトピックにするとき、「を」を「は」に変えます。",
    en: "When making the object the topic, replace 「を」 with 「は」.",
    vi: "Khi biến đối tượng thành chủ đề, thay「を」bằng「は」."
  },
  "に": {
    rule: "に → には",
    ja: "相手・到達点をトピックにするとき、「に」に「は」を加えて「には」にします。",
    en: "When making the target the topic, add 「は」 to 「に」 to get 「には」.",
    vi: "Khi biến đối tượng đích thành chủ đề, thêm「は」vào「に」để được「には」."
  }
};

// ── 不正解の選択肢プール（助詞ごと） ──
// 正解の「は形」以外に、まぎらわしい誤答3つを生成する
function makeChoices(el, allElements) {
  const correct = el.topic;
  const base = el.word.replace(/[がをにで]$/, "");

  // 誤答：元の助詞のまま、および他の助詞形
  const wrongForms = [
    el.word,                                       // 元の形（例: 私が）
    base + (el.particle === "が" ? "を" : "が"),   // 別助詞A
    base + (el.particle === "で" ? "に" : "で"),   // 別助詞B
  ].filter(w => w !== correct);

  // 重複排除して3つ取る
  const wrongs = [...new Set(wrongForms)].slice(0, 3);
  const choices = [correct, ...wrongs].sort(() => Math.random() - .5);
  return choices;
}

// ── 問題デッキ生成 ──
function buildDeck() {
  const deck = [];
  sentences.forEach(s => {
    s.elements.forEach(el => {
      deck.push({ sentence: s.sentence, el });
    });
  });
  return deck.sort(() => Math.random() - .5);
}

let deck = [], idx = 0, correct = 0, wrong = 0, answered = false;

function init() {
  deck = buildDeck();
  idx = 0; correct = 0; wrong = 0;
  document.getElementById('finish-overlay').classList.remove('visible');
  load();
}

function load() {
  answered = false;
  const q = deck[idx];
  const el = q.el;

  // 例文（対象語をハイライト）
  const highlighted = q.sentence.replace(el.word, `<span class="highlight">${el.word}</span>`);
  document.getElementById('sentence-box').innerHTML = highlighted;

  // 問い
  const baseWord = el.word.replace(/[がをにで]$/, "");
  document.getElementById('question').innerHTML =
    `「<span class="topic-word">${baseWord}</span>」をトピックにすると？`;

  // 選択肢
  const choices = makeChoices(el, deck);
  const btnsEl = document.getElementById('buttons');
  btnsEl.innerHTML = '';
  choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = ch;
    btn.dataset.val = ch;
    btnsEl.appendChild(btn);
  });

  // result / explain リセット
  document.getElementById('result').textContent = '';
  document.getElementById('result').className = 'result-row';
  document.getElementById('correct-sentence-wrap').classList.remove('visible');
  document.getElementById('correct-sentence-text').innerHTML = '';
  document.getElementById('explanation').classList.remove('visible');
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('explain-wrap').style.display = 'none';
  document.getElementById('explain-toggle').textContent = '💡 解説を見る';

  // カードアニメーション
  const card = document.getElementById('card');
  card.classList.remove('slide');
  void card.offsetWidth;
  card.classList.add('slide');

  // progress
  const total = deck.length;
  const pct = Math.round((idx / total) * 100);
  document.getElementById('progress-label').textContent = `${idx + 1} / ${total}`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('score-correct').textContent = correct;
  document.getElementById('score-wrong').textContent = wrong;
}

// 選択
document.getElementById('buttons').addEventListener('click', e => {
  const btn = e.target.closest('.choice');
  if (!btn || answered) return;
  answered = true;

  const q = deck[idx];
  const el = q.el;
  const chosen = btn.dataset.val;
  const resultEl = document.getElementById('result');

  document.querySelectorAll('.choice').forEach(b => b.disabled = true);

  if (chosen === el.topic) {
    btn.classList.add('correct');
    resultEl.innerHTML = '✔ 正解！ Correct! Đúng rồi！';
    resultEl.className = 'result-row result-correct';
    correct++;
  } else {
    btn.classList.add('wrong');
    resultEl.innerHTML = `✘ 正解は「<strong>${el.topic}</strong>」`;
    resultEl.className = 'result-row result-wrong';
    wrong++;
    document.querySelectorAll('.choice').forEach(b => {
      if (b.dataset.val === el.topic) b.classList.add('correct');
    });
  }

  // 解説を構築してボタンを表示
  const exp = explanations[el.particle];
  document.getElementById('explanation').innerHTML = `
    <div class="exp-rule">
      <span class="exp-badge">${exp.rule}</span>
      <div class="exp-lines">
        🇯🇵 ${exp.ja}<br>
        🇺🇸 ${exp.en}<br>
        🇻🇳 ${exp.vi}
      </div>
    </div>`;
  document.getElementById('explain-wrap').style.display = 'block';

  // 正解の文を生成（元の語+助詞 → は形に置き換え、文頭に移動）
  const correctedSentence = q.sentence.replace(el.word, el.topic);

  // は形要素を文頭に移動（すでに文頭にある場合はそのまま）
  let reorderedSentence;
  if (correctedSentence.startsWith(el.topic)) {
    // すでに文頭（例：私は〜）→ そのまま
    reorderedSentence = correctedSentence;
  } else {
    // 文末の「。」を除いた本文からは形要素を取り除き、文頭に付ける
    const body = correctedSentence.replace('。', '');
    const rest = body.replace(el.topic, '');
    reorderedSentence = el.topic + rest + '。';
  }

  // は形をハイライト
  const htmlSentence = reorderedSentence.replace(
    el.topic,
    `<span class="topic-hl">${el.topic}</span>`
  );
  document.getElementById('correct-sentence-text').innerHTML = htmlSentence;
  document.getElementById('correct-sentence-wrap').classList.add('visible');

  document.getElementById('score-correct').textContent = correct;
  document.getElementById('score-wrong').textContent = wrong;
});

function next() {
  idx++;
  if (idx >= deck.length) { showFinish(); return; }
  load();
}

function toggleExplanation() {
  const el = document.getElementById('explanation');
  const tg = document.getElementById('explain-toggle');
  el.classList.toggle('visible');
  tg.textContent = el.classList.contains('visible') ? '💡 解説を閉じる' : '💡 解説を見る';
}

function showFinish() {
  const total = deck.length;
  const pct = Math.round((correct / total) * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '😊' : '📚';
  document.getElementById('finish-emoji').textContent = emoji;
  document.getElementById('finish-score').textContent = `${correct} / ${total}`;
  document.getElementById('finish-sub').textContent = `正解率 ${pct}%　不正解 ${wrong} 問`;
  document.getElementById('finish-overlay').classList.add('visible');
}

function restart() { init(); }

// キーボード操作
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && answered) next();
});

init();
</script>
