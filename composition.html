<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    :root { --accent: #2196F3; --bg: #f8f9fa; --border: #ddd; }
    body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; position: relative; }
    
    .rule-txt { text-align: center; font-weight: bold; color: #555; margin-bottom: 15px; }

    /* レイアウト */
    .sentence-container { display: flex; align-items: flex-end; justify-content: center; flex-wrap: wrap; gap: 8px; }
    .required-box { display: flex; border: 2px dashed #bbb; border-radius: 10px; padding: 8px; flex-wrap: wrap; justify-content: center; gap: 8px; }

    /* 各単語ユニット */
    .word-unit { display: flex; flex-direction: column; align-items: center; width: 110px; }
    .label-tag { font-size: 0.7rem; background: #eee; padding: 2px 8px; border-radius: 4px; margin-bottom: 5px; color: #333; }
    
    select, input { width: 100%; height: 45px; border: 1px solid var(--border); border-radius: 6px; text-align: center; font-size: 1rem; }
    .predicate-style { border: 2px solid var(--accent); background: #e3f2fd; }

    .btn-shuffle { background: #333; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin-bottom: 15px; }
    .nav-link { display: block; text-align: center; color: #666; text-decoration: none; margin-top: 30px; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="container">
  <div class="rule-txt">ルール：必要なことば ＋ 述語</div>

  <div class="card">
    <button class="btn-shuffle" onclick="shuffle()">🔀 並べ替え</button>
    <div class="sentence-container">
      <div id="req-area" class="required-box"></div>
      <div id="fix-area"></div>
    </div>
  </div>

  <div class="card">
    <div style="font-size: 0.8rem; margin-bottom: 10px; color: #888;">じゆうに かいてみよう：</div>
    <div class="sentence-container">
      <div id="free-req-area" class="required-box"></div>
      <div id="free-fix-area"></div>
    </div>
  </div>

  <a href="<?= getScriptUrl() ?>" class="nav-link">← TOPにもどる</a>
</div>

<script>
  let compositionData = [];

  window.onload = () => {
    google.script.run.withSuccessHandler(data => {
      compositionData = data;
      renderAll();
    }).getCompositionData();
  };

  function renderAll() {
    const req = document.getElementById('req-area');
    const fix = document.getElementById('fix-area');
    const fReq = document.getElementById('free-req-area');
    const fFix = document.getElementById('free-fix-area');

    compositionData.forEach((col, i) => {
      const isF = (i === 5); // F列(6番目)が述語
      const unitId = `unit-${i}`;

      // 練習用HTML
      const pickerHtml = `
        <div class="word-unit" data-col="${i}">
          <span class="label-tag">${col.label}</span>
          <select class="${isF ? 'predicate-style' : ''}">
            ${col.options.map(o => `<option>${o}</option>`).join('')}
          </select>
        </div>`;

      // 自由入力用HTML
      const inputHtml = `
        <div class="word-unit" data-col="${i}">
          <span class="label-tag">${col.label}</span>
          <input type="text" class="${isF ? 'predicate-style' : ''}" placeholder="...">
        </div>`;

      if (isF) {
        fix.innerHTML = pickerHtml;
        fFix.innerHTML = inputHtml;
      } else {
        req.insertAdjacentHTML('beforeend', pickerHtml);
        fReq.insertAdjacentHTML('beforeend', inputHtml);
      }
    });
  }

  function shuffle() {
    const reqArea = document.getElementById('req-area');
    const freeReqArea = document.getElementById('free-req-area');

    // A-Eの並び替え
    for (let i = reqArea.children.length; i >= 0; i--) {
      reqArea.appendChild(reqArea.children[Math.random() * i | 0]);
    }

    // 自由入力枠の順序を同期
    const newOrder = Array.from(reqArea.children).map(child => child.dataset.col);
    const freeNodes = Array.from(freeReqArea.children);
    freeReqArea.innerHTML = "";
    newOrder.forEach(colIndex => {
      const targetNode = freeNodes.find(node => node.dataset.col === colIndex);
      freeReqArea.appendChild(targetNode);
    });
  }
</script>
</body>
</html>
