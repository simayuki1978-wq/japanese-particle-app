<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作文トレーニング</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --panel-bg: #ffffff;
            --accent: #2196F3;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 650px; text-align: center; }
        
        .rule { font-weight: bold; margin: 10px 0; color: #555; font-size: 0.9rem; }

        /* 上段：単語倉庫 */
        .warehouse-section {
            background: rgba(255,255,255,0.8); border: 1px dashed #ccc; border-radius: 10px;
            padding: 10px; margin-bottom: 15px; min-height: 60px;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 5px;
        }

        /* 下段：大きな組み立て枠 */
        .workspace-outer {
            background: var(--panel-bg); border: 3px solid #333; border-radius: 15px;
            padding: 20px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            text-align: left; position: relative;
        }

        .guide-msg { font-size: 0.85rem; color: #d32f2f; font-weight: bold; margin-bottom: 10px; }

        /* メインのドロップエリア */
        .main-drop-zone {
            min-height: 150px; display: flex; flex-wrap: wrap; align-items: flex-start;
            align-content: flex-start; gap: 10px; padding: 15px;
            background-image: radial-gradient(#ddd 1px, transparent 1px);
            background-size: 20px 20px; /* ドット背景で書き込み感を演出 */
        }

        /* 枠の中のヒントテキスト */
        .zone-hint {
            position: absolute; top: 50px; left: 20px; color: #ccc; 
            font-size: 0.85rem; pointer-events: none; line-height: 1.6;
        }

        /* 述語エリア（枠の右下） */
        .predicate-container {
            display: flex; justify-content: flex-end; align-items: center;
            gap: 10px; margin-top: 5px; width: 100%;
        }
        .predicate-label { font-weight: bold; color: #333; font-size: 1.1rem; }

        .predicate-select {
            width: 160px; height: 50px; border: 2px solid var(--accent);
            border-radius: 10px; font-size: 1.1rem; font-weight: bold;
            text-align: center; background: #e3f2fd; color: #2196F3;
        }

        /* 単語カード */
        .word-card {
            display: flex; flex-direction: column; align-items: center;
            min-width: 90px; padding: 6px 12px; border-radius: 8px;
            cursor: grab; border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); user-select: none;
            background-color: white;
        }
        .word-card .type-label { font-size: 0.65rem; margin-bottom: 2px; font-weight: bold; color: rgba(0,0,0,0.5); }
        .word-card .word-text { font-size: 1.1rem; font-weight: bold; }

        /* 色分け */
        .color-0 { background-color: #ff9a9e !important; color: #fff; }
        .color-1 { background-color: #a1c4fd !important; color: #333; }
        .color-2 { background-color: #84fab0 !important; color: #333; }
        .color-3 { background-color: #fccb90 !important; color: #333; }
        .color-4 { background-color: #e0c3fc !important; color: #333; }

        .btn-refresh { background: #444; color: white; border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-bottom: 10px;}
        .nav-link { margin-top: 20px; display: block; color: #888; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="rule">ルール：言葉を選んで文章を作ろう</div>

    <div id="warehouse" class="warehouse-section" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

    <button class="btn-refresh" onclick="location.reload()">🔄 つぎの単語</button>

    <div class="workspace-outer">
        <div class="guide-msg">＿には助詞を入れて読みましょう。</div>
        
        <div id="hint-text" class="zone-hint">
            主語（だれ・なに）<br>
            目的語（なにを）<br>
            時を表す言葉（いつ）<br>
            場所を表す言葉（どこで・どこに）<br>
            その他の連用修飾語（どのように・どれくらい）
        </div>

        <div id="main-drop-zone" class="main-drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">
            </div>
    </div>

    <div class="predicate-container">
        <span class="predicate-label">＋ 述語</span>
        <select id="predicate-roll" class="predicate-select"></select>
        <span style="font-size: 1.5rem; font-weight: bold;">。</span>
    </div>

    <a href="index.html" class="nav-link">← TOPにもどる</a>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTDRPlyoBQrG9wzUadhnR8OY9sxuPhkRRpO_WO0BNs-H_f349__5bK5vN6ZYb3U_w/pub?gid=1136664882&single=true&output=csv";

    async function init() {
        try {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            const rows = text.split('\n').filter(r => r.trim() !== "").map(r => r.split(','));
            setupApp(rows);
        } catch (e) {
            alert("データを読み込めませんでした。");
        }
    }

    function setupApp(rows) {
        const warehouse = document.getElementById('warehouse');
        const selectF = document.getElementById('predicate-roll');
        const headers = rows[0];

        // A-E列
        for (let i = 0; i < 5; i++) {
            const wordsInCol = rows.slice(1).map(r => r[i]).filter(w => w && w.trim() !== "");
            if (wordsInCol.length === 0) continue;
            const randomWord = wordsInCol[Math.floor(Math.random() * wordsInCol.length)];
            
            const card = document.createElement('div');
            card.className = `word-card color-${i}`;
            card.id = 'card-' + i;
            card.draggable = true;
            card.innerHTML = `<span class="type-label">${headers[i] || ""}</span><span class="word-text">${randomWord}</span>`;
            card.ondragstart = drag;
            warehouse.appendChild(card);
        }

        // F列（述語）
        const fWords = rows.slice(1).map(r => r[5]).filter(w => w && w.trim() !== "");
        selectF.innerHTML = `<option value="">(${(headers[5] || "述語").trim()})</option>`;
        fWords.forEach(w => {
            const opt = document.createElement('option');
            opt.value = w; opt.innerText = w;
            selectF.appendChild(opt);
        });
    }

    function allowDrop(ev) { ev.preventDefault(); }
    function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
    function drop(ev) {
        ev.preventDefault();
        const data = ev.dataTransfer.getData("text");
        const draggedElement = document.getElementById(data);
        const target = ev.target.closest('#main-drop-zone') || ev.target.closest('#warehouse');
        
        if (target) {
            target.appendChild(draggedElement);
            // 枠の中にカードがある場合はヒントを消す
            const mainZone = document.getElementById('main-drop-zone');
            document.getElementById('hint-text').style.display = (mainZone.children.length > 0) ? 'none' : 'block';
        }
    }
    init();
</script>

</body>
</html>
