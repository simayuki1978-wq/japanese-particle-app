<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語トレーニング</title>
    <style>
        /* 全体のレイアウト */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f7fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #333;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 1.8rem;
            color: #2c3e50;
        }

        /* ボタンのコンテナ */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 300px;
        }

        /* ボタンの基本デザイン */
        .btn {
            display: block;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            color: white;
            border-radius: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }

        /* 助詞ボタンの色（ピンク系） */
        .btn-particle {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        }

        /* 作文ボタンの色（ブルー系） */
        .btn-composition {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            color: #333; /* 文字色を濃くして読みやすく */
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <h1>日本語トレーニング</h1>

    <div class="btn-container">
        <a href="particle.html" class="btn btn-particle">助詞ボタン</a>
        
        <a href="composition.html" class="btn btn-composition">作文ボタン</a>
    </div>

    <div class="footer">© 2024 日本語学習サポート</div>

</body>
</html>
